; FloatingDamageNG configuration
; Install to Data/SKSE/Plugins/FloatingDamageNG.ini

[CoreFilters]
bShowPlayerDamageDealt=true
bShowFollowerDamageDealt=true
; NPC-on-NPC numbers render small/dim and are distance-culled (see fMaxVisibilityRadius).
bShowNPCOnNPCDamage=true
; Player-received damage. Flat third-person only: auto-suppressed in VR (until the
; head-locked HUD mode lands) and while in first person.
bShowPlayerDamageTaken=true
; Healing numbers ("+N", green). Heal streams accumulate until fMinHealToShow;
; natural regen trickle never reaches it and is discarded.
bShowHealing=true
; Hostile magicka/stamina damage (shock's magicka bleed, frost's stamina bleed,
; absorb/drain effects). Self costs (casting, sprinting, power attacks) never show.
bShowMagickaDamage=false
bShowStaminaDamage=false
; NPC-on-NPC numbers beyond this many meters are culled entirely.
fMaxVisibilityRadius=20.0
iMaxConcurrentQuads=40

[DynamicSizing]
fBaseFontScale=1.0
; Damage-magnitude sizing: FinalScale = clamp(Base + log10(damage) * Mod, 0.6, Ceiling).
fLogScaleModifier=0.25
fMaxFontScaleCeiling=1.6

[Font]
; TTF used for damage text. Empty = auto: Data/Interface/FloatingDamageNG/FloatingDamageNG.ttf,
; then Windows Arial Bold / Segoe UI Bold.
sFontPath=

[KinematicProfiles]
; 0 = Float (straight rise), 1 = Arc (WoW-style parabola), 2 = Radial (AoE burst)
iSelectedProfile=1
fGlobalSpeedMultiplier=1.1
fQuadLifetimeSeconds=1.5

[Behavior]
; Show the "(-N resisted)" mitigation subtext under the damage number.
bShowMitigation=true
fMinDamageToShow=1.0
fMinHealToShow=5.0
; Rapid same-type ticks on one target merge into a single number within this window (seconds).
fDotAccumulationWindow=0.35

[Colors]
; 0xRRGGBB
sPhysical=0xFF3B30
sCritical=0xFFCC00
sBlocked=0x4A4A4A
sFire=0xFF9500
sFrost=0x5AC8FA
sShock=0xAF52DE
sPoison=0x4CD964
sMagic=0xC7B8E8
sHealing=0x34C759
sMagickaDamage=0x4169E1
sStaminaDamage=0x2E8B57

[FirstPerson]
; Player-received damage and healing in first person: pinned to a screen spot on
; flat, anchored ~1m ahead at chest height in VR. false = hidden in first person.
bShowFirstPersonNumbers=true
fPositionX=0.5
fPositionY=0.72

[Locational]
; Tag projectile hits with the struck body part, read from the engine's impact
; node — works in vanilla and with any locational-damage mod (nothing mod-specific).
bShowHitLocation=true
; Up to 8 regex->label pairs matched (case-insensitive) against the skeleton node
; name; first match wins. Default when none defined: sPattern1=.*head.* -> HEADSHOT
sPattern1=.*head.*
sLabel1=HEADSHOT
; Show the implied external multiplier (e.g. x2.5) when a projectile hit exceeds
; its physical+crit baseline — how locational mods amplify damage. Heuristic.
bShowAmplification=true
fAmplificationThreshold=1.4

[Analytics]
; Combat sessions (start on player aggro, end when combat clears) with per-combatant
; damage/healing/crits, real vs active DPS, time-to-die, and fled detection.
bEnableCombatLog=true
; Append session reports to <SKSE logs>/FloatingDamageNG-combat.log.
bWriteLogToDisk=true
; Small live DPS readout, top-right (flat screen only for now).
bEnableLiveDPSWindow=true
bLogFollowerPerformance=true
; Opt-in: register the floatingdamage.stats MCP/REST tool with the devbench host
; (devbench serves a local port; this exposes your combat stats on it).
bEnableDevBench=false
fPostCombatWindowFadeSeconds=5.0

[Debug]
bDebugLog=false
; 1 Hz audit: compares each tracked actor's observed health delta against the
; captured event stream and warns in the SKSE log about suspected missed damage.
bDeltaAudit=false
