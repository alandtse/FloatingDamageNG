; FloatingDamageNG configuration
; Install to Data/SKSE/Plugins/FloatingDamageNG.ini

[CoreFilters]
bShowPlayerDamageDealt=true
bShowFollowerDamageDealt=true
; NPC-on-NPC numbers render smaller with a gray outline and are distance-culled (see fMaxVisibilityRadius).
bShowNPCOnNPCDamage=true
; Player-received damage. Flat third-person only: auto-suppressed in VR (until the
; head-locked HUD mode lands) and while in first person.
bShowPlayerDamageTaken=true
; Healing numbers ("+N", green). Heal streams accumulate until fMinHealToShow;
; natural regen trickle never reaches it and is discarded.
bShowHealing=true
; Hostile magicka/stamina damage (shock's magicka bleed, frost's stamina bleed,
; absorb/drain effects). Self costs (casting, sprinting, power attacks) never show.
bShowMagickaDamage=false
bShowStaminaDamage=false
; NPC-on-NPC numbers beyond this many meters are culled entirely.
fMaxVisibilityRadius=20.0
iMaxConcurrentQuads=40

[DynamicSizing]
; Atlas resolution numbers rasterize at (16-128). Higher = crisper/larger.
fBaseFontPixels=48.0
fBaseFontScale=1.0
; Damage-magnitude sizing: FinalScale = clamp(Base + log10(damage) * Mod, 0.1, Ceiling).
fLogScaleModifier=0.25
fMaxFontScaleCeiling=2.5
; Show 10000+ as 1.2k / 3.4M.
bAbbreviateNumbers=false
; Stretch numbers vertically while they move fast, easing to normal (launch juice).
bSquashStretch=false
fStretchIntensity=0.5

[Distance]
; How number size responds to target distance (ranged-attack readability).
; Numbers are full size within fReferenceMeters; past it, flat shrinks (floored
; at fFlatMinScale, 1.0 = never shrink) and VR grows the quad (capped at
; fVRMaxBoost) to hold angular size. Raise the reference and/or the flat floor
; if distant/ranged numbers look too small.
fReferenceMeters=3.5
fFlatMinScale=0.5
fVRMaxBoost=8.0

[Font]
; TTF used for damage text. Empty = auto: Data/Interface/FloatingDamageNG/FloatingDamageNG.ttf,
; then Windows Arial Bold / Segoe UI Bold. A path change takes effect on restart.
; Drop your own .ttf/.otf in Data/SKSE/Plugins/FloatingDamageNG/Fonts to pick it
; from the in-game font list.
sFontPath=

[KinematicProfiles]
; The spawn "effect". The compiled default is Float (a plain rise). Arc,
; Radial, and Fireworks ship as loose presets in the Presets folder - load
; one from the menu, or set the fields below directly. iSelectedProfile is
; legacy (0 = the compiled Float) and just seeds the fields on first run.
iSelectedProfile=0
; Motion path: travel(t)=damping>0 ? speed*(1-e^-damping*t)/damping : speed*t;
; vertical(t)=riseSpeed*t + 0.5*riseAccel*t^2 (riseAccel<0 = gravity).
fRiseSpeed=45.0
fRiseAccel=0.0
fLateralSpeed=0.0
fLateralDamping=0.0
; Launch distribution for stacked hits: 0 alternate L/R, 1 rotate (fireworks),
; 2 diagonal-alternate. fSpawnAngle = degrees rotated per hit (1) or tilt (2).
iSpreadPattern=0
fSpawnAngle=0.0
fGlobalSpeedMultiplier=1.1
fQuadLifetimeSeconds=1.5

[Origin]
; Spawn-point offset from the target's head, view-relative (game units).
fOffsetUp=0.0
fOffsetToward=0.0
fOffsetSide=0.0
; Rapid same-target hits (alternate pattern): per-step gap and side bias
; (-1 all left, 0 even, +1 all right).
fRapidHitSpread=30.0
fRapidHitBias=0.0

[PerType]
; Optional per-damage-type overrides; empty = use the global setting.
; sMotion<Type> names a preset (built-in or a Presets/*.json) - e.g.
; sMotionFire=Fireworks to make fire spray. sFont<Type> is a TTF/OTF path
; (a font in the picker's list), applied on the next game start.
sMotionPhysical=
sFontPhysical=
sMotionFire=
sFontFire=
sMotionFrost=
sFontFrost=
sMotionShock=
sFontShock=
sMotionPoison=
sFontPoison=
sMotionMagic=
sFontMagic=
sMotionHealing=
sFontHealing=
sMotionMagickaDrain=
sFontMagickaDrain=
sMotionStaminaDrain=
sFontStaminaDrain=

[Behavior]
; Show the "(-N armor/blocked/resisted)" mitigation subtext under the damage number.
bShowMitigation=true
fMinDamageToShow=1.0
fMinHealToShow=5.0
; Rapid same-type ticks on one target merge into a single number within this window (seconds).
fDotAccumulationWindow=0.35

[Style]
; How a number marks whose fight it is (the number's own color always means the
; damage type). 0 = colored text outline, 1 = underline bar, 2 = box border, in
; the sOrigin* colors below; 3 = none (plain black outline, source not shown).
iOriginStyle=0
; Outline / underline / box thickness in pixels (0.5-6).
fStyleThickness=4.0

[Colors]
; 0xRRGGBB
sPhysical=0xFF3B30
sCritical=0xFFCC00
sBlocked=0x4A4A4A
sFire=0xFF9500
sFrost=0x5AC8FA
sShock=0xAF52DE
sPoison=0x4CD964
sMagic=0xC7B8E8
sHealing=0x34C759
sMagickaDamage=0x4169E1
sStaminaDamage=0x2E8B57
; Origin markers: your hits, damage you take, follower damage, NPC fights.
sOriginPlayer=0x000000
sOriginTaken=0x8C1414
sOriginFollower=0x19508C
sOriginNPC=0x3C3C3C

[FirstPerson]
; Player-received damage and healing in first person: pinned to a screen spot on
; flat, anchored ~1m ahead at chest height in VR. false = hidden in first person.
bShowFirstPersonNumbers=true
fPositionX=0.5
fPositionY=0.72

[Locational]
; Tag projectile hits with the struck body part, read from the engine's impact
; node - works in vanilla and with any locational-damage mod (nothing mod-specific).
bShowHitLocation=true
; Up to 8 regex->label pairs matched (case-insensitive) against the skeleton node
; name; first match wins. Default when none defined: sPattern1=.*head.* -> HEADSHOT
sPattern1=.*head.*
sLabel1=HEADSHOT
; Show the implied external multiplier (e.g. x2.5) when a projectile hit exceeds
; its physical+crit baseline - how locational mods amplify damage. Heuristic.
bShowAmplification=true
fAmplificationThreshold=1.4

[Analytics]
; Combat sessions (start on player aggro, end when combat clears) with per-combatant
; damage/healing/crits, real vs active DPS, time-to-die, and fled detection.
bEnableCombatLog=true
; Append session reports to <SKSE logs>/FloatingDamageNG-combat.log.
bWriteLogToDisk=true
; Structured exports next to the SKSE logs (both rotated at 5 MB):
; JSONL = one JSON object per session (pandas/jq), CSV = one row per combatant (Excel).
bExportJsonl=false
bExportCsv=false
; Small live DPS readout: top-right on flat, head-locked HUD plane in VR. Off by
; default - enable here or in the SKSE Menu Framework panel.
bEnableLiveDPSWindow=false
bLogFollowerPerformance=true
; Opt-in: register the floatingdamage.stats MCP/REST tool with the devbench host
; (devbench serves a local port; this exposes your combat stats on it).
bEnableDevBench=false
fPostCombatWindowFadeSeconds=5.0

[Debug]
bDebugLog=false
; 1 Hz audit: compares each tracked actor's observed health delta against the
; captured event stream and warns in the SKSE log about suspected missed damage.
bDeltaAudit=false
